name: Property Check

on:
  schedule:
    - cron: "0 7,11,15,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: property-check
  cancel-in-progress: true

jobs:
  check-properties:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Telegram secrets
        run: |
          printf "%s" "${{ secrets.TELEGRAM_BOT_TOKEN }}" > .telegram_token
          printf "%s" "${{ secrets.TELEGRAM_CHAT_ID }}" > .telegram_chat_id

      - name: Run property agent
        run: python property_agent.py

      - name: Upload run report
        uses: actions/upload-artifact@v6
        with:
          name: property-report-${{ github.run_number }}
          path: |
            latest_report.md
            reports/
            seen_listings.json
          if-no-files-found: warn

      - name: Commit updated seen listings and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json latest_report.md reports/
          git diff --cached --quiet || git commit -m "Update property monitor state"
          git push